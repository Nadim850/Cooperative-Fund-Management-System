<template>
  <lightning-card title="Family">
    <div class="slds-p-around_medium">
      <!-- Add Family button -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <lightning-button
          alternative-text="Create New Family"
          label="Create New Family"
          icon-name="utility:adduser"
          variant="bare"
          class="slds-m-center_xx-large"
          title="Create Family"
          onclick={openFamilyModal}
        ></lightning-button>
      </div>
      <!-- search family input section -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <lightning-input
          type="text"
          label="search family name"
          placeholder="Family Name"
          onchange={handleSearch}
        >
        </lightning-input>
      </div>
      <!-- delete multiple Family button -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <template if:false={showDeleteButton}>
          <lightning-button
            label="Delete Selected"
            onclick={handleDeleteSelected}
            variant="bare"
            class="slds-m-center_xx-large"
            title="Delete All"
            icon-name="utility:delete"
            key-field="Id"
          >
          </lightning-button>
        </template>
      </div>
      <!-- families list -->

      <div class="slds-m-top_large slds-m-bottom_large">
        <!-- display family datatable -->
        <lightning-datatable
          key-field="Id"
          data={displayFamily}
          columns={columns}
          onrowaction={handleFamilyRowAction}
          onrowselection={handleRowSelection}
        >
        </lightning-datatable>
      </div>

      <!-- modal popup for MEMBERS-FAMILY CREATION -->
      <template if:true={showModal}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open"
        >
          <div class="slds-modal__container">
            <!-- Header -->
            <header class="slds-modal__header">
              <lightning-button-icon
                icon-name="utility:close"
                alternative-text="Close"
                onclick={closeModal}
                class="slds-modal__close"
              >
              </lightning-button-icon>

              <h2 class="slds-text-heading_medium">{modalTitle}</h2>
            </header>

            <!-- Body -->
            <!-- Member creation form  -->
            <div class="slds-modal__content slds-p-around_medium">
              <!-- Member creation form  -->
              <template if:true={showMemberCreationForm}>
                <lightning-record-edit-form
                  object-api-name={Member__c}
                  onsuccess={handleMemberSuccess}
                  onerror={handleError}
                >
                  <lightning-input-field
                    field-name="Name"
                    required
                  ></lightning-input-field>
                  <lightning-input-field
                    field-name="Email__c"
                  ></lightning-input-field>
                  <lightning-input-field
                    field-name="Phone__c"
                  ></lightning-input-field>
                  <lightning-input-field
                    field-name="Address__c"
                  ></lightning-input-field>
                  <lightning-input-field
                    field-name="Family__c"
                    value={selectedFamilyId}
                  ></lightning-input-field>
                  <lightning-button
                    type="submit"
                    label="Save Member"
                    variant="bare"
                  ></lightning-button>
                </lightning-record-edit-form>
              </template>

              <!-- Family creation form  -->

              <template if:true={showFamilyCreationForm}>
                <lightning-input
                  label="Family Name"
                  value={familyName}
                  onchange={handleFamilyName}
                  required
                ></lightning-input>
                <lightning-input
                  label="Head Name"
                  value={headName}
                  onchange={handleHeadName}
                  required
                ></lightning-input>
                <lightning-input
                  label="Email"
                  value={headEmail}
                  onchange={handleHeadEmail}
                  required
                ></lightning-input>
                <lightning-input
                  label="Phone"
                  value={headPhone}
                  onchange={handleHeadPhone}
                  required
                ></lightning-input>
                <lightning-input
                  label="Address"
                  value={headAddress}
                  onchange={handleHeadAddress}
                  required
                ></lightning-input>
                <lightning-button
                  label="Save"
                  variant="brand"
                  onclick={handleSave}
                ></lightning-button>
              </template>
              <!-- View Members table popup -->
              <template if:true={showMemberTable}>
                <div class="slds-m-top_large slds-m-bottom_large">
                  <lightning-datatable
                    key-field="Id"
                    columns={member_columns}
                    data={filteredMembers}
                  >
                  </lightning-datatable>
                </div>
              </template>
            </div>

            <!-- Footer -->
            <footer class="slds-modal__footer">
              <lightning-button label="Close" onclick={closeModal}>
              </lightning-button>
            </footer>
          </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>
    </div>
  </lightning-card>
</template>
