<template>
  <lightning-card title="Member">
    <div class="slds-p-around_medium">
      <!-- Add Member button -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <lightning-button
          alternative-text="Create new member"
          label="Create New Member"
          icon-name="utility:adduser"
          variant="bare"
          class="slds-m-center_xx-large"
          title="Create Member"
          onclick={openMemberModal}
        ></lightning-button>
      </div>
      <!-- delete multiple Member button -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <template if:false={showDeleteButton}>
          <lightning-button
            label="Delete Selected"
            onclick={handleDeleteSelected}
            variant="bare"
            class="slds-m-center_xx-large"
            title="Delete All"
            icon-name="utility:delete"
            key-field="Id"
          >
          </lightning-button>
        </template>
      </div>
      <!-- search member input section -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <!-- spinner modale -->
        <div class="slds-is-relative">
          <template if:true={isLoading}>
            <div class="slds-spinner_container">
              <lightning-spinner
                class="top-spinner"
                alternative-text="Deleting..."
                size="medium"
                variant="brand"
              >
              </lightning-spinner>
            </div>
          </template>
        </div>
        <lightning-input
          type="text"
          label="search member name"
          placeholder="Member Name"
          onchange={handleSearch}
        >
        </lightning-input>
      </div>
      <!-- display Member datatable -->
      <div class="slds-m-top_large slds-m-bottom_large">
        <lightning-datatable
          key-field="Id"
          data={displayMember}
          columns={columns}
          onrowaction={handleMemberRowAction}
          onrowselection={handleRowSelection}
        >
        </lightning-datatable>
      </div>

      <!-- modal popup for MEMBERS-FAMILY CREATION -->
      <template if:true={showModal}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open"
        >
          <div class="slds-modal__container">
            <!-- Header -->
            <header class="slds-modal__header">
              <lightning-button-icon
                icon-name="utility:close"
                alternative-text="Close"
                onclick={closeModal}
                class="slds-modal__close"
              >
              </lightning-button-icon>

              <h2 class="slds-text-heading_medium">{modalTitle}</h2>
            </header>

            <!-- Body -->
            <div class="slds-modal__content slds-p-around_medium">
              <!-- create new member form -->
              <template if:true={showMemberForm}>
                <lightning-record-form
                  object-api-name={Member__c}
                  fields={Member__c_fields}
                  onsuccess={handleMemberSuccess}
                  onerror={handleError}
                >
                </lightning-record-form>
              </template>
              <!-- show member detail form -->
              <template if:true={showMemberDetail}>
                <lightning-record-view-form
                  record-id={selectedMemberId}
                  object-api-name="Member__c"
                >
                  <lightning-output-field
                    field-name="Name"
                  ></lightning-output-field>
                  <lightning-output-field
                    field-name="Email__c"
                  ></lightning-output-field>
                  <lightning-output-field
                    field-name="Phone__c"
                  ></lightning-output-field>
                  <lightning-output-field
                    field-name="Address__c"
                  ></lightning-output-field>
                  <lightning-output-field
                    field-name="Contribution__c"
                  ></lightning-output-field>
                </lightning-record-view-form>
              </template>
            </div>

            <!-- Footer -->
            <footer class="slds-modal__footer">
              <lightning-button label="Close" onclick={closeModal}>
              </lightning-button>
            </footer>
          </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>
    </div>
  </lightning-card>
</template>
